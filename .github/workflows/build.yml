name: Build SetupHelper

# Binaries and PDBs are not committed; download them from the workflow run's artifacts.
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure CMake
        run: cmake -S . -B out -G "Visual Studio 17 2022" -A Win32 -T v142

      - name: Build
        run: cmake --build out --config Release

      # VS often emits the linker PDB under out/Release/ while the exe is redirected to build/;
      # CMake POST_BUILD should copy it—this step recovers if that path still differs on the runner.
      - name: Ensure SetupHelper.pdb is next to staged exe
        shell: pwsh
        run: |
          if (Test-Path "build/SetupHelper.pdb") { exit 0 }
          $pdb = Get-ChildItem -Path "out" -Recurse -Filter "SetupHelper.pdb" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $pdb) {
            throw "SetupHelper.pdb not found under out/ after build; check MSVC debug flags."
          }
          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          Copy-Item -LiteralPath $pdb.FullName -Destination "build/SetupHelper.pdb" -Force

      # Shipped exe + PDB: Actions → this run → Artifacts (same build id for both files).
      - name: Upload executable and PDB
        uses: actions/upload-artifact@v4
        with:
          name: SetupHelper-windows-x86-with-symbols
          path: |
            build/SetupHelper.exe
            build/SetupHelper.pdb
          if-no-files-found: error
